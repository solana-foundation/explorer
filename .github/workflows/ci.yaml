name: CI

on:
  push:
    branches: [master, development, 'development-*']
  pull_request:

env:
  # cache affixes and folders
  PNPM_CACHE_AFFIX: pnpm
  PNPM_CACHE_FOLDER: ~/.pnpm-store
  PLAYWRIGHT_CACHE_AFFIX: pw
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
  SENTRY_TELEMETRY_DISABLE: true
  STORYBOOK_DISABLE_TELEMETRY: 1
  OPENSPEC_TELEMETRY: 0

jobs:
  # Job to read Node version from .nvmrc
  read-nvmrc:
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.nvmrc.outputs.NODE_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .nvmrc
          sparse-checkout-cone-mode: false

      - name: Read .nvmrc
        id: nvmrc
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

  Build-And-Test:
    needs: read-nvmrc
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: ['${{ needs.read-nvmrc.outputs.node-version }}', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install package manager
        uses: pnpm/action-setup@v4

      # Configure pnpm store directory BEFORE setup-node tries to cache it
      - name: Setup pnpm config
        run: pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Additional Cache
        uses: actions/cache@v5
        id: additional_cache
        with:
          path: |
            ${{ env.PNPM_CACHE_FOLDER }}
            ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/.browserslistrc') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-

      - name: Install dependencies
        run: |
          echo "Node version: $(node --version)"
          echo "PNPM version: $(pnpm --version)"
          pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:ci

      - name: Lint
        run: pnpm lint

      - name: OpenSpec
        run: pnpm openspec:validate

      - name: Build
        run: pnpm build

      - name: Test
        env:
          TEST_SERIAL_TIMEOUT: ${{ vars.TEST_SERIAL_TIMEOUT }}
        run: |
          pnpm test:ci

  Sitemap-Check:
    needs: read-nvmrc
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install package manager
        uses: pnpm/action-setup@v4

      - name: Setup pnpm config
        run: pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.read-nvmrc.outputs.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # scripts/update-sitemap.ts imports app/utils/programs.ts, which imports the built @explorer/decoder-mango.
      - name: Build workspace packages
        run: pnpm build:packages

      - name: Generate sitemap
        run: pnpm exec tsx scripts/update-sitemap.ts

      - name: Check for sitemap drift
        run: git diff --exit-code public/sitemap.xml public/default-sitemap.xml public/accounts-sitemap.xml

  Storybook-Smoke-Tests:
    needs: read-nvmrc
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    strategy:
      matrix:
        node-version: ['${{ needs.read-nvmrc.outputs.node-version }}', '24.x']

    # The browser-mode sweep has repeatedly died on a full root partition ("No space left on device").
    # Browsers and the Vite dep-optimize cache live on the runner's ~65 GB /mnt scratch disk
    # (PLAYWRIGHT_BROWSERS_PATH / VITE_CACHE_PATH); the pnpm store stays on / so node_modules keeps hardlinking,
    # with `pnpm store prune` stopping the restore-keys snowball. Job-own cache affixes keep old archives out.
    env:
      PNPM_CACHE_AFFIX: pnpm-sb
      PLAYWRIGHT_CACHE_AFFIX: pw-mnt
      PLAYWRIGHT_BROWSERS_PATH: /mnt/cache/ms-playwright
      VITE_CACHE_PATH: /mnt/cache/vite

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare cache dirs on the scratch disk
        run: |
          sudo mkdir -p "$PLAYWRIGHT_BROWSERS_PATH" "$VITE_CACHE_PATH"
          sudo chown -R "$(id -u):$(id -g)" "$PLAYWRIGHT_BROWSERS_PATH" "$VITE_CACHE_PATH"

      - name: Install package manager
        uses: pnpm/action-setup@v4

      - name: Setup pnpm config
        run: pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PNPM_CACHE_AFFIX }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright_cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-${{ env.PLAYWRIGHT_CACHE_AFFIX }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PLAYWRIGHT_CACHE_AFFIX }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Drops store packages no longer referenced by the lockfile so the restored-then-saved cache stays bounded.
      - name: Prune pnpm store
        run: pnpm store prune

      - name: Install Playwright browsers
        if: steps.playwright_cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright_cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Storybook smoke tests
        env:
          STORYBOOK_DISABLE_TELEMETRY: ${{ env.STORYBOOK_DISABLE_TELEMETRY }}
        run: pnpm test:sb
