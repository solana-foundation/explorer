name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  Build-And-Test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install package manager
        uses: pnpm/action-setup@v2
        with:
          version: 8.6.6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Evaluate Cache Path
        id: pnpm_cache
        run: |
          PNPM_CACHE_PATH=$(pnpm store path)
          echo "PNPM_CACHE_PATH=$PNPM_CACHE_PATH" >> $GITHUB_OUTPUT
          echo "$PNPM_CACHE_PATH"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm_cache.outputs.PNPM_CACHE_PATH }}
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        env:
          NEXT_PUBLIC_MAINNET_RPC_URL: ${{ vars.NEXT_PUBLIC_MAINNET_RPC_URL }}
          NEXT_PUBLIC_DEVNET_RPC_URL: ${{ vars.NEXT_PUBLIC_DEVNET_RPC_URL }}
        run: pnpm build

      - name: Test
        env:
          NEXT_PUBLIC_MAINNET_RPC_URL: ${{ vars.NEXT_PUBLIC_MAINNET_RPC_URL }}
          NEXT_PUBLIC_DEVNET_RPC_URL: ${{ vars.NEXT_PUBLIC_DEVNET_RPC_URL }}
        run: pnpm test:ci
